name: Dataset intake

on:
  issues:
    types: [opened, edited, reopened]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  issue-precheck:
    name: Issue precheck
    if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'dataset-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Add review labels
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['automated-precheck', 'needs-human-review']
            });

      - name: Post intake comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              'Automated precheck received this dataset submission.',
              '',
              'Maintainer review is still required before catalogue publication.',
              '',
              'Precheck scope:',
              '- confirms the request entered the dataset intake queue;',
              '- reminds reviewers by email when SMTP secrets are configured;',
              '- checks PR metadata files when a contributor opens a pull request;',
              '- leaves scientific suitability, license interpretation, and final acceptance to maintainers.'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  metadata-validation:
    name: Metadata validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate dataset metadata
        run: python scripts/validate_dataset_metadata.py

      - name: Check datasets.js freshness
        run: |
          python scripts/generate_datasets_js.py
          if ! git diff --exit-code website/datasets.js; then
            echo "::error::website/datasets.js is stale. Run 'python scripts/generate_datasets_js.py' locally and commit the result."
            echo "Stale datasets.js means the website will not show newly added datasets."
            exit 1
          fi

  notify-reviewers:
    name: Notify reviewers
    if: always() && (github.event_name == 'pull_request' || (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'dataset-submission')))
    runs-on: ubuntu-latest
    needs: [issue-precheck, metadata-validation]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send reviewer notification
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/notify_reviewers.py
